<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FairShare - Login</title>
  </head>
  <body>
    <div id="app">
      
      <div class=" justify-center max-w-sm mt-50 mx-auto bg-white py-10 px-10 rounded-lg shadow-lg" >
          <form action="submit" class="flex flex-col gap-4">

            <h1 class="self-center text-2xl font-medium mb-4">Login</h1>

            <div>
              <input type="email" placeholder="Enter your email" class="input w-full">
            </div>
            
            <div class="relative">
              <span id="togglePasswordBtn" class="absolute right-3 top-1/2
               -translate-y-1/2 text-gray-400 cursor-pointer hidden">👁️</span>
              <input type="password" placeholder="Enter your password" class="input w-full input-pass">

            </div>
            
            <button class="bg-green-400 rounded-4xl px-4 py-3 text-sm mt-2">Sign in</button>
          </form>
          
       </div>

    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
